<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project O</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>

    <div class="vignette"></div>

    <main class="main-container">
        <header class="header">
            <h1 class="glitch" data-text="Project O">Project O</h1>
            <p class="subtitle">A Corpse Party inspired web multiplayer game!</p>
        </header>

        <section class="content-box">
            <h2 class="section-title">Survive the haunted school</h2>
            <ul>
                <li>Will you perish alone, cling to the group, or succumb to your <span class="blood-text">darker urges</span>?</li>
                <li>Struggle against the inevitability of death.</li>
                <li>Every corner a gamble with life...</li>
            </ul>
            <button class="btn-horror">Spread the Curse</button>
        </section>

        <footer class="footer">
            <p>© 1997 Project O - <span class="blood-text">???</span></p>
        </footer>
    </main>
